name: smart_daily_planner
description: A smart daily planner mobile application with AI assistance.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  intl: ^0.20.2
  uuid: ^4.0.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  http: ^1.1.0
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.1.0
  geolocator: ^13.0.2
  speech_to_text: ^7.0.0
  image_picker: ^1.1.2
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
